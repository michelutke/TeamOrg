ktor {
  deployment {
    port = 8080
  }
  application {
    modules = [ch.teamorg.ApplicationKt.module]
  }
}

jwt {
  secret = "dev-secret-change-in-production"
  secret = ${?JWT_SECRET}
  issuer = "teamorg"
  audience = "teamorg-users"
  realm = "teamorg"
  expiry-days = 30
}

database {
  url = "jdbc:postgresql://localhost:5432/teamorg?user=miggi"
  url = ${?DATABASE_URL}
  driver = "org.postgresql.Driver"
}

onesignal {
  app-id = ""
  app-id = ${?ONESIGNAL_APP_ID}
  api-key = ""
  api-key = ${?ONESIGNAL_API_KEY}
}

# Contact / demo-request form (teamorg.ch landing). Sends mail via SMTP
# (Infomaniak primary; Proton as backup) — provider-agnostic, set via env.
contact {
  smtp {
    host = ""
    host = ${?SMTP_HOST}
    port = "587"
    port = ${?SMTP_PORT}
    user = ""
    user = ${?SMTP_USER}
    password = ""
    password = ${?SMTP_PASS}
  }
  # From-address must be an address you own on the SMTP account (defaults to SMTP_USER).
  from = ""
  from = ${?CONTACT_FROM}
  to = "info@teamorg.ch"
  to = ${?CONTACT_TO}
  # Optional shared secret; if set, callers must send it as the X-Contact-Secret header.
  shared-secret = ""
  shared-secret = ${?CONTACT_SHARED_SECRET}
}
