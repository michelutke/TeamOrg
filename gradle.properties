#Kotlin
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx3072M

#Gradle
org.gradle.jvmargs=-Xmx4096M -Dfile.encoding=UTF-8
org.gradle.configuration-cache=true
org.gradle.caching=true

#Android
android.nonTransitiveRClass=true
android.useAndroidX=true

# NOTE: do NOT set API_BASE_URL here — gradle.properties is committed and would be
# baked into every build (incl. CI release). Set it in local.properties (gitignored)
# for local dev, or via the API_BASE_URL env var / -PAPI_BASE_URL in CI.