name: Deploy to Coolify

# Triggers a Coolify deployment. Coolify pulls this repo and builds the server +
# admin images itself (server/Dockerfile, admin/Dockerfile, docker-compose.yml).

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

concurrency:
  group: coolify-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger Coolify deployment
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/production' && 'production' || 'development' }}

    steps:
      - name: Trigger deploy webhook
        run: |
          if [ -z "${{ secrets.COOLIFY_WEBHOOK }}" ] || [ -z "${{ secrets.COOLIFY_TOKEN }}" ]; then
            echo "::error::COOLIFY_WEBHOOK and COOLIFY_TOKEN must be set (repo/environment secrets)."
            exit 1
          fi
          echo "Triggering Coolify deployment for ${GITHUB_REF_NAME} @ ${GITHUB_SHA}"
          status=$(curl -sS -o /tmp/coolify_resp.txt -w "%{http_code}" \
            -X GET "${{ secrets.COOLIFY_WEBHOOK }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}")
          echo "Response ($status):"; cat /tmp/coolify_resp.txt; echo
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::Coolify deploy trigger failed with HTTP $status"
            exit 1
          fi
