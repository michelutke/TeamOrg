name: Deploy Android to Updraft

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build APK + Upload to Updraft
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/production' && 'production' || 'development' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create local.properties
        run: |
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> local.properties
          echo "onesignal.appId=${{ secrets.ONESIGNAL_APP_ID }}" >> local.properties

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "Using google-services.json from secret."
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > composeApp/google-services.json
          else
            echo "No GOOGLE_SERVICES_JSON_BASE64 secret set — writing placeholder (push notifications won't work)."
            cat > composeApp/google-services.json << 'GSEOF'
          {
            "project_info": { "project_number": "000000000000", "project_id": "teamorg-ci", "storage_bucket": "teamorg-ci.appspot.com" },
            "client": [{ "client_info": { "mobilesdk_app_id": "1:000000000000:android:0000000000000000", "android_client_info": { "package_name": "ch.teamorg" } }, "oauth_client": [], "api_key": [{ "current_key": "placeholder-key" }], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } }],
            "configuration_version": "1"
          }
          GSEOF
          fi

      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > composeApp/release.jks

      - name: Build Release APK
        run: ./gradlew :composeApp:assembleRelease
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload to Updraft
        run: |
          APK_PATH=$(find composeApp/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: Could not find APK file."
            exit 1
          fi
          echo "Uploading: $APK_PATH"
          curl -v -X PUT --http1.1 \
            -F "app=@$APK_PATH" \
            -F "whats_new=Build from GitHub Actions. Run: ${GITHUB_RUN_NUMBER}" \
            -F "build_version=${GITHUB_RUN_NUMBER}" \
            "https://app.getupdraft.com/api/app_upload/${{ secrets.UPDRAFT_APP_KEY }}/${{ secrets.UPDRAFT_API_KEY }}/"
